# Deploys The Plate Lab (platelab.note15.com) whenever main is updated.
#
# The SSH key used here is a dedicated, revocable deploy key that is locked on
# the server to a single forced command (deploy-platelab.sh) — it cannot open a
# shell or do anything else, so a leak only allows "redeploy platelab".
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY      private half of the deploy key
#   DEPLOY_KNOWN_HOSTS  server host key(s) (ssh-keyscan output)
#   DEPLOY_HOST         143.244.188.235
#   DEPLOY_USER         andy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: deploy-platelab
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # The server's forced command runs deploy-platelab.sh regardless of args.
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "$DEPLOY_USER@$DEPLOY_HOST" deploy

      - name: Health check
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 3 https://platelab.note15.com/)
          echo "https://platelab.note15.com/ -> HTTP $code"
          test "$code" = "200"
