# Deploys The Plate Lab (platelab.note15.com) whenever main is updated.
#
# The SSH key used here is a dedicated, revocable deploy key that is locked on
# the server to a single forced command (deploy-platelab.sh) — it cannot open a
# shell or do anything else, so a leak only allows "redeploy platelab".
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY      private half of the deploy key
#   DEPLOY_KNOWN_HOSTS  server host key(s) (ssh-keyscan output)
#   DEPLOY_HOST         143.244.188.235
#   DEPLOY_USER         andy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two deploys run at once; let an in-flight deploy finish.
concurrency:
  group: deploy-platelab
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # The server's forced command runs deploy-platelab.sh regardless of args.
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "$DEPLOY_USER@$DEPLOY_HOST" deploy

      - name: Health check
        # Poll the live URL — tolerates the few seconds Next.js takes to come
        # back up after the pm2 restart, and transient curl/connection errors
        # (which curl --retry won't retry on its own).
        run: |
          # Production: https://theplatelab.site (OVH). platelab.note15.com is the frozen dev box.
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://theplatelab.site/ || true)
            echo "attempt $i: https://theplatelab.site/ -> HTTP ${code:-000}"
            [ "$code" = "200" ] && { echo "healthy"; exit 0; }
            sleep 5
          done
          echo "site did not return 200 after retries"; exit 1
